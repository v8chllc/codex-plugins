name: Codex Plugins Quality

on:
  pull_request:
  push:
  workflow_dispatch:
permissions:
  contents: read

jobs:
  quality:
    name: Validate Codex plugin marketplace
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python quality tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install black ruff mypy pytest typer python-dotenv

      - name: Validate Codex marketplace metadata
        run: pytest tests/test_codex_marketplace.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Lint Markdown
        run: npm run lint:md

      - name: Check Python formatting
        run: black --check .

      - name: Lint Python
        run: ruff check .

      - name: Check Ruff formatting
        run: ruff format --check .

      - name: Type check Python
        run: mypy

      - name: Run Python tests
        run: pytest
